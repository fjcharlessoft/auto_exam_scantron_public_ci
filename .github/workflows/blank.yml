# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  repository_dispatch:
    types:
      - auto_exam_scantron_public_ci
  push:
    branches: [ '*' ]
  pull_request:
  release:
    types: [ created, edited ]
  workflow_dispatch:
    inputs:
      gva_version:
        required: true
        type: string

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: macos-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install dding on non-Windows
        if: runner.os != 'Windows'
        run: |
          pip install dding
          mkdir -p ~/.dding
          dding_secret="${{ github.event.client_payload.secret || env.DEFAULT_DDING_SECRET }}"
          dding_token="${{ github.event.client_payload.token || env.DEFAULT_DDING_TOKEN }}"
          cat <<EOF > ~/.dding/config.json
          [
              {
                  "group": "default",
                  "secret": "$dding_secret",
                  "token": "$dding_token"
              }
          ]
          EOF
      
      - name: Install dding on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install dding
          New-Item -Path $HOME\.dding -ItemType Directory -Force
          $dding_secret = "${{ github.event.client_payload.secret || env.DEFAULT_DDING_SECRET }}"
          $dding_token = "${{ github.event.client_payload.token || env.DEFAULT_DDING_TOKEN }}"
          $config = @"
          [
              {
                  "group": "default",
                  "secret": "$dding_secret",
                  "token": "$dding_token"
              }
          ]
          "@
          $config | Out-File -FilePath $HOME\.dding\config.json -Encoding utf8
            
      - name: Set up JDK 8 (OpenJDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # 选择OpenJDK发行版，这里用temurin（建议，官方推荐）
          java-version: '8'

      - name: Check Java version
        run: java -version

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

          
      - name: Cache SSH known hosts
        id: cache-ssh-hosts
        uses: actions/cache@v3
        with:
          path: ~/.ssh/known_hosts
          key: ssh-known-hosts-${{ runner.os }}-v1
          restore-keys: |
            ssh-known-hosts-${{ runner.os }}-
            
      - name: show payload
        run: |
          echo "Client payload: ${{ toJson(github.event.client_payload) }}"
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'
          
      # - name: Set up Python 2.7
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '2.7'
      #   continue-on-error: true  # Python 2.7 可能不可用

  
      - name: Add GitHub and Gitee ssh-key to known hosts
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts"
          ssh-keyscan gitee.com >> "$HOME/.ssh/known_hosts"
          
      - name: Set up Node.js v16.0.0
        uses: actions/setup-node@v4
        with:
          node-version: '14.x'
          architecture: 'x64'  # 关键：强制使用 x64
          

          
          # node-version: '16.14.0'

      - name: git clone 
        run: |
          # git clone ${{ github.event.client_payload.gitaddress }}
          echo ${{ github.event.client_payload.raw_branch }}
          echo ${{ github.event.client_payload.BRANCH_NAME }}
          git clone -b ${{ github.event.client_payload.BRANCH_NAME }} ${{ github.event. client_payload.gitaddress }}
          git clone git@github.com:charlessoft/myutils.git ./${{ github.event.client_payload.project_name }}/myutils

          # git clone git@gitee.com:charlesabc/myutils.git ./${{ github.event.client_payload.project_name }}/myutils
          ls ./${{ github.event.client_payload.project_name }}
          echo "pwd"
          echo ${PWD}

          # echo "BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
          # echo "BRANCH_NAME=master" >> $GITHUB_ENV
          
      - name: Get current branch name
        id: get_branch
        run: |
          echo "BRANCH=${{github.event.client_payload.BRANCH_NAME}}" >> $GITHUB_ENV
          echo "UTILS_DIR=${PWD}/${{github.event.client_payload.project_name}}/myutils" >> $GITHUB_ENV
          echo "WORK_ROOT_DIR=${PWD}/${{github.event.client_payload.project_name}}" >> $GITHUB_ENV
          echo "WORKSPACE=${PWD}/${{github.event.client_payload.project_name}}" >> $GITHUB_ENV
          echo "JENKINS_ENV_PATH=${PWD}/${{github.event.client_payload.project_name}}/.JENKINS.env" >> $GITHUB_ENV
          echo "RELEASE_PACKAGE=123.60.164.114" >> $GITHUB_ENV 
          echo "JAVA_SSO_PACKAGE=sso-1.0.1.jar"  >> $GITHUB_ENV
          echo "ISDEBUG=${{github.event.client_payload.isdebug}}" >> $GITHUB_ENV

          # echo "==========="
          # echo $(git rev-parse --abbrev-ref HEAD)
          # echo "==========="


      - name: Generate JENKINS.env
        run: |
          echo "export BRANCH=$BRANCH " >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export UTILS_DIR=$UTILS_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          echo "export WORK_ROOT_DIR=$WORK_ROOT_DIR" >> $WORK_ROOT_DIR/.JENKINS.env
          
          if [ "$ISDEBUG" = "true" ]; then
            echo "============ JENKINS.env Content ============"
            cat $WORK_ROOT_DIR/.JENKINS.env
            echo "============================================="
          fi
        working-directory: ./${{ github.event.client_payload.project_name }}

      # - name: Setup Debug Session
      #   uses: mxschmitt/action-tmate@v3
      #   timeout-minutes: 15
      #   with:
      #     detached: true

      - name: build
        run: |
          pushd .
          cd ${UTILS_DIR}
          source utils.sh
          popd 

          NODE22_CELLAR_ROOT="/opt/homebrew/Cellar/node@22"
          if [ -d "$NODE22_CELLAR_ROOT" ]; then
            NODE22_DIR="$(find "$NODE22_CELLAR_ROOT" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            if [ -n "$NODE22_DIR" ] && [ -d "$NODE22_DIR" ]; then
              mv "$NODE22_DIR" "${NODE22_DIR}_bak"
            else
              echo "No installed node@22 directory found under $NODE22_CELLAR_ROOT, skipping rename."
            fi
          else
            echo "$NODE22_CELLAR_ROOT does not exist, skipping rename."
          fi


          npm config set registry https://registry.npmmirror.com

          # 设置 node-gyp 的 disturl 为新镜像
          npm config set disturl https://npmmirror.com/mirrors/node
          
          
          
          find ${WORKSPACE}/myutils/auto_exam/ -name "*.sh" -exec dos2unix {} \;
          
          
          sh ${WORKSPACE}/myutils/auto_exam/scantron-web/scripts/build_web.sh ${JENKINS_ENV_PATH} || CheckLastResult
          
          
          sh ${WORKSPACE}/myutils/auto_exam/scantron-web/scripts/publish_web.sh ${JENKINS_ENV_PATH} || CheckLastResult


          # 部署
          sh ${WORKSPACE}/myutils/auto_exam/scantron-web/scripts/develop/deploy_web.sh ${JENKINS_ENV_PATH} || CheckLastResult
          # 麦小
          ##sh ${WORKSPACE}/myutils/auto_exam/scantron-web/scripts/maixiao/deploy_web.sh ${JENKINS_ENV_PATH} || CheckLastResult
          
          # 观澜
          sh ${WORKSPACE}/myutils/auto_exam/scantron-web/scripts/guanlan/deploy_web.sh ${JENKINS_ENV_PATH} || CheckLastResult
